flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  
  # الأيقونة الافتراضية لنظام iOS ونظام أندرويد القديم (تحت إصدار 8)
  image_path: "assets/images/logo.jpg"
  
  # 🤖 إعدادات الأيقونات المتكيفة لأندرويد حديث (8.0+)
